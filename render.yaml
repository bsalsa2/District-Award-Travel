# Render Blueprint for District Award Travel
# ============================================
# This file lets you deploy the whole backend + website in one click.
# In Render: New + → Blueprint → connect this repo → it reads this file.
#
# After the first deploy, set the secret env vars in the Render dashboard
# (GMAIL_APP_PASSWORD, ADMIN_PASSWORD) — they are marked sync:false below so
# they are NOT stored in git.

services:
  - type: web
    name: district-award-travel
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz        # real check: pings the DB, 503 when degraded
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"              # Render reads this to pick the Python runtime
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random value
      - key: DATABASE_URL
        fromDatabase:
          name: dat-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@districtawardtravel.com
      - key: ADMIN_PASSWORD
        sync: false                  # set this yourself in the dashboard
      - key: GMAIL_USER
        value: districtawardtravel@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false                  # set this yourself in the dashboard
      - key: NOTIFY_EMAIL
        value: districtawardtravel@gmail.com
      - key: CRON_SECRET
        sync: false                  # set yourself; used by /api/cron/digest
      - key: GROQ_API_KEY
        sync: false                  # set in Render dashboard (from GitHub Secrets)
      - key: GEMINI_API_KEY
        sync: false                  # set in Render dashboard (from GitHub Secrets)
      - key: SEATS_AERO_API_KEY
        sync: false                  # optional paid add-on — seats.aero Pro ($99.99/yr) for live award availability; everything works without it

  # ── Staging (commented out for now): uncomment when you're ready to test on a
  # separate branch before production. To enable: (1) create a 'staging' branch,
  # (2) uncomment this service block, (3) re-sync Blueprint in Render.
  # Staging uses test data only (seed script refuses to run in prod).
  #
  # - type: web
  #   name: district-award-travel-staging
  #   runtime: python
  #   plan: free
  #   rootDir: backend
  #   buildCommand: pip install --upgrade pip && pip install -r requirements.txt
  #   startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
  #   healthCheckPath: /healthz
  #   branch: staging                  # deploys the 'staging' branch, not main
  #   envVars:
  #     - key: PYTHON_VERSION
  #       value: "3.11.9"
  #     - key: ENV
  #       value: staging
  #     - key: SECRET_KEY
  #       generateValue: true
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: dat-db-staging
  #         property: connectionString
  #     - key: ADMIN_EMAIL
  #       value: admin@districtawardtravel.com
  #     - key: ADMIN_PASSWORD
  #       sync: false
  #     # Email/AI deliberately unset on staging: emails print to logs, AI
  #     # endpoints degrade gracefully — that's the manual-path test for free.

databases:
  - name: dat-db
    plan: free
  # - name: dat-db-staging
  #   plan: free
