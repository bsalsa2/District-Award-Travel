name: Auto-merge dev to main

# Automatically merge claude/zen-fermat-mfUuH → main on every push
# so Render auto-deploys immediately without manual PR steps

on:
  push:
    branches:
      - claude/zen-fermat-mfUuH

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev to main
        run: |
          git fetch origin main claude/zen-fermat-mfUuH
          git checkout main
          git merge origin/claude/zen-fermat-mfUuH --no-edit
          git push origin main
