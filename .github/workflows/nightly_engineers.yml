name: Daily Ops Briefing

# Emails Braden a prioritized summary of client deadlines and action items
# every morning. Replaces the old nightly free-form engineering agents, which
# were generating noise and causing repeated merge conflicts.

# PAUSED: the scheduled briefing is disabled until the admin dashboard is
# wired to the backend, so action items can be managed from the dashboard
# (no manual file editing). Only manual runs are possible for now.
"on":
  workflow_dispatch:        # manual-only; re-enable the schedule line later

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily ops briefing
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python agents/morning_brief.py
