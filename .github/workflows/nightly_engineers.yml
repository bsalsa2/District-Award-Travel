name: Nightly Engineering Run — District Award Travel

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      engineer:
        description: 'marcus / jordan / priya / all'
        required: false
        default: 'all'
        
jobs:
  marcus-backend:
          - name: Commit work
        run: |
          git config user.name "Marcus Webb [AI]"
          git config user.email "marcus@district-award-travel.ai"
          git fetch origin
          git checkout main
          git add -A
          git diff --staged --quiet || git commit -m "Marcus: $(date '+%Y-%m-%d') backend work"
          git push origin main --force
  jordan-automation:
               - name: Commit work
        run: |
          git config user.name "Jordan Reyes [AI]"
          git config user.email "jordan@district-award-travel.ai"
          git fetch origin
          git checkout main
          git add -A
          git diff --staged --quiet || git commit -m "Jordan: $(date '+%Y-%m-%d') automation work"
          git push origin main --force
          
          priya-frontend:
          - name: Commit work
        run: |
          git config user.name "Priya Kapoor [AI]"
          git config user.email "priya@district-award-travel.ai"
          git add -A
          git diff --staged --quiet || git commit -m "Priya: $(date '+%Y-%m-%d') frontend work"
          git fetch origin main
          git push origin HEAD:main --force-with-lease || git push origin HEAD:main --force

  morning-brief:
    name: Morning Briefing Report
    runs-on: ubuntu-latest
    needs: [marcus-backend, jordan-automation, priya-frontend]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openai google-generativeai python-dotenv requests beautifulsoup4 fastapi sqlalchemy pydantic jinja2
      - name: Generate brief
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: python agents/morning_brief.py
      - name: Commit brief
        run: |
          git config user.name "DAT Ops"
          git config user.email "ops@district-award-travel.ai"
          git add logs/
          git diff --staged --quiet || git commit -m "Morning brief: $(date '+%Y-%m-%d')"
          git push
