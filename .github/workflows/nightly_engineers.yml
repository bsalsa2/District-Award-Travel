name: Nightly Engineering Run — District Award Travel

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:

  marcus-backend:
    name: Marcus Webb — Backend Engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openai google-generativeai python-dotenv requests beautifulsoup4 fastapi sqlalchemy pydantic jinja2
      - name: Run Marcus
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agents/run_engineer.py marcus
      - name: Commit work
        run: |
          git config user.name "Marcus Webb [AI]"
          git config user.email "marcus@district-award-travel.ai"
          git add -A
          git diff --staged --quiet || git commit -m "Marcus: $(date '+%Y-%m-%d') backend work"
          git push origin main --force

  jordan-automation:
    name: Jordan Reyes — Automation Engineer
    runs-on: ubuntu-latest
    needs: marcus-backend
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install openai google-generativeai python-dotenv requests
      - run: npm install axios cheerio dotenv winston || true
      - name: Run Jordan
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOOKING_ENABLED: "false"
        run: python agents/run_engineer.py jordan
      - name: Commit work
        run: |
          git config user.name "Jordan Reyes [AI]"
          git config user.email "jordan@district-award-travel.ai"
          git add -A -- ':!node_modules'
          git diff --staged --quiet || git commit -m "Jordan: $(date '+%Y-%m-%d') automation work"
          git push origin main --force

  priya-frontend:
    name: Priya Kapoor — Frontend Engineer
    runs-on: ubuntu-latest
    needs: jordan-automation
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openai google-generativeai python-dotenv requests
      - name: Run Priya
        env:
          D
