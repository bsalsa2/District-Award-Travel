name: Nightly Engineering Run

"on":
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-all-engineers:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install openai google-generativeai python-dotenv requests beautifulsoup4 fastapi sqlalchemy pydantic jinja2 aiohttp

      - name: Run Mitchell (Infrastructure)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python agents/run_engineer.py mitchell

      - name: Run Martin (Backend)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python agents/run_engineer.py martin

      - name: Run Jeff (AI & Full-Stack)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python agents/run_engineer.py jeff

      - name: Commit all engineer work
        run: |
          git config user.name "DAT Engineers"
          git config user.email "engineers@dat.ai"
          git add -A -- ':!node_modules'
          git diff --staged --quiet || git commit -m "Nightly build $(date '+%Y-%m-%d')"
          git push origin main --force

  morning-email:
    runs-on: ubuntu-latest
    needs: run-all-engineers
    if: always()
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests

      - name: Send morning report
        env:
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python agents/morning_brief.py

      - name: Commit report
        run: |
          git config user.name "DAT Ops"
          git config user.email "ops@dat.ai"
          git add logs/
          git diff --staged --quiet || git commit -m "Morning brief $(date '+%Y-%m-%d')"
          git push origin main --force
