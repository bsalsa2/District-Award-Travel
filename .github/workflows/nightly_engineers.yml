name: Nightly Engineering Run

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-all-engineers:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install openai google-generativeai python-dotenv requests beautifulsoup4 fastapi sqlalchemy pydantic jinja2

      - name: Run Marcus
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agents/run_engineer.py marcus

      - name: Run Jordan
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agents/run_engineer.py jordan

      - name: Run Priya
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agents/run_engineer.py priya

      - name: Commit all work
        run: |
          git config user.name "DAT Engineers"
          git config user.email "engineers@dat.ai"
          git add -A -- ':!node_modules'
          git diff --staged --quiet || git commit -m "Engineers: $(date '+%Y-%m-%d')"
          git push origin main --force
