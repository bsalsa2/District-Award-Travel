<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Award Redemption Recommender</title>
    <style>
        body {
            background-color: #2f2f2f;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #4f4f4f;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
        }
        .form label {
            font-weight: bold;
        }
        .form input[type="text"] {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #6f6f6f;
            color: #ffffff;
        }
        .form input[type="checkbox"] {
            margin-right: 10px;
        }
        .button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0069d9;
        }
        .recommendations {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-gap: 20px;
            margin-top: 40px;
        }
        .recommendation {
            background-color: #6f6f6f;
            padding: 20px;
            border-radius: 10px;
        }
        .recommendation h2 {
            font-weight: bold;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Award Redemption Recommender</h1>
        <form class="form">
            <label for="miles-balances">Miles Balances:</label>
            <input type="text" id="miles-balances" name="miles_balances" placeholder="e.g. {'United MileagePlus': 100000, 'American Airlines AAdvantage': 50000}">
            <label for="travel-goals">Travel Goals:</label>
            <input type="text" id="travel-goals" name="travel_goals" placeholder="e.g. SFO-FRA, JFK-DOH">
            <label for="flexible-dates">Flexible Dates:</label>
            <input type="checkbox" id="flexible-dates" name="flexible_dates">
            <button class="button" id="find-recommendations">Find Best Redemptions</button>
        </form>
        <div class="recommendations" id="recommendations"></div>
    </div>

    <script>
        const form = document.querySelector('form');
        const recommendationsContainer = document.querySelector('#recommendations');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const milesBalances = document.querySelector('#miles-balances').value;
            const travelGoals = document.querySelector('#travel-goals').value;
            const flexibleDates = document.querySelector('#flexible-dates').checked;
            const response = await fetch('/recommend', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    miles_balances: JSON.parse(milesBalances),
                    travel_goals: travelGoals.split(','),
                    flexible_dates: flexibleDates
                })
            });
            const data = await response.json();
            const recommendations = data.recommendations;
            recommendationsContainer.innerHTML = '';
            recommendations.forEach((recommendation) => {
                const recommendationHTML = `
                    <div class="recommendation">
                        <h2>${recommendation.program_used} Award Redemption</h2>
                        <p>Route: ${recommendation.route}</p>
                        <p>Estimated Miles: ${recommendation.estimated_miles}</p>
                        <p>Estimated Taxes: $${recommendation.estimated_taxes_usd}</p>
                        <p>Value Score: ${recommendation.value_score}</p>
                        <p>Reasoning: ${recommendation.reasoning}</p>
                    </div>
                `;
                recommendationsContainer.insertAdjacentHTML('beforeend', recommendationHTML);
            });
        });
    </script>
</body>
</html>
