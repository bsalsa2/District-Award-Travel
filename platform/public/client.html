<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — District Award Travel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f5f1ed; color:#2a2a2a; font-family:system-ui,-apple-system,sans-serif; min-height:100vh; }

  /* NAV */
  nav { background:#ff8a1e; padding:18px 32px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:1.2rem; font-weight:800; color:#fff; }
  .nav-info { display:flex; gap:20px; align-items:center; font-size:.9rem; }
  .nav-info span { color:rgba(255,255,255,0.8); }
  .nav-info strong { color:#fff; }
  .btn-logout { background:rgba(255,255,255,.2); color:#fff; border:none; padding:7px 16px; border-radius:6px; cursor:pointer; font-size:.85rem; transition:all .2s; }
  .btn-logout:hover { background:rgba(255,255,255,.3); }

  /* LOGIN */
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 60px); padding:40px 20px; }
  .login-box { background:#fff; border:2px solid #ff8a1e; border-radius:12px; padding:40px; width:100%; max-width:380px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
  .login-box h2 { font-size:1.4rem; color:#ff8a1e; margin-bottom:6px; }
  .login-box p { color:#888; font-size:.9rem; margin-bottom:24px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:.8rem; color:#666; margin-bottom:5px; font-weight:600; }
  .form-group input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:6px; font-size:.9rem; }
  .form-group input:focus { outline:none; border-color:#ff8a1e; box-shadow:0 0 0 3px rgba(255,138,30,.1); }
  .btn-primary { width:100%; background:#ff8a1e; color:#fff; border:none; padding:12px; border-radius:6px; font-weight:700; cursor:pointer; font-size:.95rem; }
  .btn-primary:hover { background:#e85d04; }
  .login-error { color:#ef4444; font-size:.85rem; margin-top:10px; display:none; text-align:center; }

  /* PORTAL */
  #portal { display:none; padding:40px 32px; max-width:1000px; margin:0 auto; }
  .portal-head { margin-bottom:40px; }
  .portal-head h1 { font-size:2rem; color:#2a2a2a; margin-bottom:4px; font-weight:800; }
  .portal-head p { color:#888; font-size:.95rem; }

  /* MESSAGES SECTION */
  .section { margin-bottom:40px; }
  .section-title { font-size:1rem; font-weight:800; color:#ff8a1e; margin-bottom:16px; text-transform:uppercase; letter-spacing:.05em; }
  .message-card { background:#fff; border-left:4px solid #ff8a1e; padding:20px; margin-bottom:12px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .message-card.unread { background:rgba(255,138,30,.05); }
  .msg-from { font-weight:700; color:#2a2a2a; margin-bottom:4px; font-size:.95rem; }
  .msg-subject { color:#ff8a1e; font-weight:600; margin-bottom:8px; font-size:.9rem; }
  .msg-body { color:#555; line-height:1.6; margin-bottom:12px; white-space:pre-wrap; word-wrap:break-word; }
  .msg-time { font-size:.75rem; color:#aaa; }
  .msg-options { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .msg-option { display:inline-block; padding:6px 12px; background:#f5f1ed; color:#666; border-radius:4px; font-size:.8rem; border-left:2px solid #ff8a1e; }

  /* TRIPS */
  .trip-card { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.04); margin-bottom:12px; }
  .trip-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .trip-dest { font-size:1.3rem; font-weight:800; color:#2a2a2a; }
  .trip-dates { color:#888; font-size:.9rem; margin-top:2px; }
  .trip-meta { font-size:.85rem; color:#888; line-height:1.8; }

  /* POINTS */
  .points-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
  .point-card { background:#fff; padding:18px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.04); border-top:3px solid #ff8a1e; }
  .point-name { font-weight:700; color:#2a2a2a; font-size:.95rem; margin-bottom:8px; }
  .point-balance { font-size:1.5rem; color:#ff8a1e; font-weight:800; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:40px 20px; color:#888; }
  .empty-icon { font-size:3rem; margin-bottom:12px; }
  .empty-text { font-size:.95rem; }

  .hidden { display:none; }
</style>
</head>
<body>

<nav>
  <div class="logo">District Award Travel</div>
  <div class="nav-info">
    <div><span>Welcome,</span> <strong id="nav-name">Client</strong></div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div id="login-screen">
  <div class="login-box">
    <h2>Sign In</h2>
    <p>Access your travel portal</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Access Code</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="portal">
  <div class="portal-head">
    <h1 id="portal-name">Welcome</h1>
    <p id="portal-tier">District Award Travel Client</p>
  </div>

  <!-- MESSAGES FROM ADVISOR -->
  <div class="section">
    <div class="section-title">💬 Messages from Braden</div>
    <div id="messages-container">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No messages yet. Your advisor will reach out soon.</div>
      </div>
    </div>
  </div>

  <!-- TRIPS -->
  <div class="section">
    <div class="section-title">✈️ Your Trips</div>
    <div id="trips-container">
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <div class="empty-text">No trips on file yet.</div>
      </div>
    </div>
  </div>

  <!-- POINTS -->
  <div class="section">
    <div class="section-title">⭐ Your Points & Miles</div>
    <div id="points-container" class="points-grid">
      <div class="empty-state">
        <div class="empty-icon">💰</div>
        <div class="empty-text">No points recorded yet.</div>
      </div>
    </div>
  </div>

</div>

<script>
let currentClient = null;
let autoRefreshInterval = null;

// Escape user/admin-supplied strings before HTML interpolation
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function showPortal(c) {
  currentClient = c;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
  const firstName = (c.name || 'Client').split(' ')[0];
  document.getElementById('nav-name').textContent = firstName;
  document.getElementById('portal-name').textContent = `Welcome back, ${firstName}`;
  document.getElementById('portal-tier').textContent = (c.tier || 'Client') + ' — District Award Travel';
  renderPortal(c);
  startAutoRefresh();
}

function loginError(msg) {
  const err = document.getElementById('login-error');
  if (msg) err.textContent = msg;
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 4000);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value.trim();
  const btn = document.querySelector('#login-screen .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    if (res.ok) {
      const { token } = await res.json();
      sessionStorage.setItem('dat_client_token', token);
      const me = await fetch('/api/client/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (me.ok) {
        if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
        return showPortal(await me.json());
      }
    }
    if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
    if (res.status === 429) {
      loginError('Too many attempts. Please wait a few minutes and try again.');
    } else {
      loginError('Invalid credentials.');
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
    loginError('Cannot reach the server. Please try again in a minute.');
  }
}

function logout() {
  currentClient = null;
  stopAutoRefresh();
  sessionStorage.removeItem('dat_client_token');
  document.getElementById('portal').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

function renderPortal(c) {
  const data = c.data ? (typeof c.data === 'string' ? JSON.parse(c.data) : c.data) : c;
  const messages = data.messages || c.messages || [];
  const trips = data.trips || c.trips || [];
  const points = data.points || c.points || [];

  renderMessages(messages);
  renderTrips(trips);
  renderPoints(points);
}

function renderMessages(msgs) {
  const mc = document.getElementById('messages-container');
  if (!msgs || msgs.length === 0) {
    mc.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No messages yet.</div></div>';
    return;
  }
  mc.innerHTML = msgs.map(m => `
    <div class="message-card ${m.unread ? 'unread' : ''}">
      <div class="msg-from">${esc(m.from || 'Braden')}</div>
      ${m.subject ? `<div class="msg-subject">${esc(m.subject)}</div>` : ''}
      <div class="msg-body">${esc(m.text)}</div>
      ${m.plan && m.plan.options ? `
        <div class="msg-options">
          ${m.plan.options.map((opt, i) => `<div class="msg-option">OPTION ${i+1}: ${opt.desc ? esc(opt.desc.substring(0, 30)) + '...' : ''}</div>`).join('')}
        </div>
      ` : ''}
      <div class="msg-time">${m.time ? esc(new Date(m.time).toLocaleDateString()) : ''}</div>
    </div>
  `).join('');
}

function renderTrips(trips) {
  const tc = document.getElementById('trips-container');
  if (!trips || trips.length === 0) {
    tc.innerHTML = '<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">No trips on file yet.</div></div>';
    return;
  }
  tc.innerHTML = trips.map(t => `
    <div class="trip-card">
      <div class="trip-header">
        <div>
          <div class="trip-dest">${esc(t.destination || t.dest || 'Trip')}</div>
          <div class="trip-dates">${esc(t.dates)}</div>
        </div>
      </div>
      <div class="trip-meta">
        ${t.passengers ? `${esc(t.passengers)} passenger${t.passengers != '1' ? 's' : ''}` : ''}
        ${t.cabin ? `• ${esc(t.cabin)}` : ''}
        ${t.flexibility ? `• ${esc(t.flexibility)}` : ''}
      </div>
    </div>
  `).join('');
}

function renderPoints(points) {
  const pc = document.getElementById('points-container');
  if (!points || points.length === 0) {
    pc.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">💰</div><div class="empty-text">No points recorded yet.</div></div>';
    return;
  }
  pc.innerHTML = points.map(p => `
    <div class="point-card">
      <div class="point-name">${esc(p.program || 'Points')}</div>
      <div class="point-balance">${esc(p.balance || '—')}</div>
    </div>
  `).join('');
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshInterval = setInterval(async function() {
    const token = sessionStorage.getItem('dat_client_token');
    if (!token) {
      stopAutoRefresh();
      return;
    }
    try {
      const res = await fetch('/api/client/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.ok) {
        const updated = await res.json();
        if (currentClient) {
          Object.assign(currentClient, updated);
          renderPortal(currentClient);
        }
      }
    } catch (e) {
      // Silent fail
    }
  }, 10000);
}

function stopAutoRefresh() {
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
  }
}
</script>

</body>
</html>
