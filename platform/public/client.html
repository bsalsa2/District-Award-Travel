<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — District Award Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--off:#fafaf9;--card:#f5f5f4;
  --text:#1c1917;--muted:#78716c;--dim:#a8a29e;
  --accent:#f97316;--accent-dim:rgba(249,115,22,.08);--accent-border:rgba(249,115,22,.2);
  --border:#e7e5e4;--border2:#d6d3d1;--red:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--off);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
/* NAV */
nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 0 var(--border)}
.nav-logo{font-size:15px;font-weight:800;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-email{font-size:13px;color:var(--muted)}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);transition:all .2s}
.btn-logout:hover{border-color:var(--accent-border);color:var(--accent)}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:40px 20px}
.login-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:36px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-box h2{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.5px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.02em}
.form-group input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:var(--font);background:var(--off);color:var(--text);outline:none;transition:border-color .15s}
.form-group input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;font-family:var(--font);transition:all .18s}
.btn-primary:hover{background:#ea6c0a}
.login-error{color:var(--red);font-size:13px;margin-top:10px;display:none;text-align:center}
/* PORTAL */
#portal{display:none;padding:36px 24px;max-width:860px;margin:0 auto}
.portal-head{margin-bottom:32px}
.portal-head h1{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.7px}
.portal-head p{color:var(--muted);font-size:14px}
.savings-counter{display:none;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-top:16px;box-shadow:var(--shadow);text-align:center;max-width:340px}
.savings-label{font-size:11px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.savings-amount{font-size:32px;font-weight:800;color:var(--accent);letter-spacing:-1px;font-variant-numeric:tabular-nums}
/* SECTION */
.section{margin-bottom:32px}
.section-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:.1em}
/* MESSAGE CARD */
.message-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:10px;box-shadow:var(--shadow);border-left:3px solid var(--border2)}
.message-card.unread{border-left-color:var(--accent);background:var(--bg)}
.msg-from{font-weight:700;color:var(--text);margin-bottom:3px;font-size:14px}
.msg-subject{color:var(--accent);font-weight:600;margin-bottom:8px;font-size:13px}
.msg-body{color:var(--muted);line-height:1.65;margin-bottom:10px;white-space:pre-wrap;word-wrap:break-word;font-size:14px}
.msg-time{font-size:12px;color:var(--dim)}
.msg-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.msg-option{display:inline-block;padding:6px 12px;background:var(--off);color:var(--muted);border-radius:6px;font-size:12px;border-left:2px solid var(--accent)}
/* TRIP CARD */
.trip-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow)}
.trip-dest{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.4px}
.trip-dates{color:var(--muted);font-size:13px;margin-bottom:6px}
.trip-meta{font-size:13px;color:var(--dim)}
/* POINTS GRID */
.points-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.point-card{background:var(--bg);padding:16px;border-radius:10px;border:1px solid var(--border);box-shadow:var(--shadow)}
.point-name{font-weight:700;color:var(--text);font-size:13px;margin-bottom:6px}
.point-balance{font-size:20px;color:var(--accent);font-weight:800;letter-spacing:-.5px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:36px 20px;color:var(--dim);background:var(--bg);border:1px dashed var(--border2);border-radius:12px}
.empty-icon{font-size:28px;margin-bottom:10px}
.empty-text{font-size:14px}
.hidden{display:none}
@media(max-width:600px){
  nav{padding:0 16px}
  .nav-email{display:none}
  #portal{padding:24px 16px}
  .points-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">District <span>Award</span> Travel</div>
  <div class="nav-right">
    <span class="nav-email" id="nav-name">Client</span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div id="login-screen">
  <div class="login-box">
    <h2>Sign In</h2>
    <p>Access your travel portal</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Access Code</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="portal">
  <div class="portal-head">
    <h1 id="portal-name">Welcome</h1>
    <p id="portal-tier">District Award Travel Client</p>
    <div class="savings-counter" id="savings-counter">
      <div class="savings-label">You've saved with District</div>
      <div class="savings-amount" id="savings-amount">$0</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Messages from Braden</div>
    <div id="messages-container">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No messages yet. Your advisor will reach out soon.</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Your Trips</div>
    <div id="trips-container">
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <div class="empty-text">No trips on file yet.</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Your Points &amp; Miles</div>
    <div id="points-container" class="points-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">💰</div>
        <div class="empty-text">No points recorded yet.</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentClient = null;
let autoRefreshInterval = null;

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function showPortal(c) {
  currentClient = c;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
  const firstName = (c.name || 'Client').split(' ')[0];
  document.getElementById('nav-name').textContent = firstName;
  document.getElementById('portal-name').textContent = 'Hi ' + firstName + ' 👋';
  document.getElementById('portal-tier').textContent = (c.tier || 'Client') + ' — District Award Travel';
  const lifetimeCents = c.lifetime_savings_cents || 0;
  if (lifetimeCents > 0) {
    const counterEl = document.getElementById('savings-counter');
    const amountEl = document.getElementById('savings-amount');
    counterEl.style.display = 'block';
    const target = lifetimeCents / 100;
    const duration = 1000;
    const start = performance.now();
    function animateCounter(ts) {
      const elapsed = ts - start;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      const val = target * ease;
      amountEl.textContent = '$' + val.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      if (progress < 1) requestAnimationFrame(animateCounter);
    }
    requestAnimationFrame(animateCounter);
  } else {
    document.getElementById('savings-counter').style.display = 'none';
  }
  renderPortal(c);
  startAutoRefresh();
}

function loginError(msg) {
  const err = document.getElementById('login-error');
  if (msg) err.textContent = msg;
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 4000);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value.trim();
  const btn = document.querySelector('#login-screen .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    if (res.ok) {
      const { token } = await res.json();
      sessionStorage.setItem('dat_client_token', token);
      const me = await fetch('/api/client/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (me.ok) {
        if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
        return showPortal(await me.json());
      }
    }
    if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
    if (res.status === 429) {
      loginError('Too many attempts. Please wait a few minutes and try again.');
    } else {
      loginError('Invalid credentials.');
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
    loginError('Cannot reach the server. Please try again in a minute.');
  }
}

function logout() {
  currentClient = null;
  stopAutoRefresh();
  sessionStorage.removeItem('dat_client_token');
  document.getElementById('portal').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

function renderPortal(c) {
  const data = c.data ? (typeof c.data === 'string' ? JSON.parse(c.data) : c.data) : c;
  const messages = data.messages || c.messages || [];
  const trips = data.trips || c.trips || [];
  const points = data.points || c.points || [];
  renderMessages(messages);
  renderTrips(trips);
  renderPoints(points);
}

function renderMessages(msgs) {
  const mc = document.getElementById('messages-container');
  if (!msgs || msgs.length === 0) {
    mc.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No messages yet. Your advisor will reach out soon.</div></div>';
    return;
  }
  mc.innerHTML = msgs.map(m => `
    <div class="message-card ${m.unread ? 'unread' : ''}">
      <div class="msg-from">${esc(m.from || 'Braden')}</div>
      ${m.subject ? `<div class="msg-subject">${esc(m.subject)}</div>` : ''}
      <div class="msg-body">${esc(m.text)}</div>
      ${m.plan && m.plan.options ? `
        <div class="msg-options">
          ${m.plan.options.map((opt, i) => `<div class="msg-option">OPTION ${i+1}: ${opt.desc ? esc(opt.desc.substring(0, 30)) + '...' : ''}</div>`).join('')}
        </div>
      ` : ''}
      <div class="msg-time">${m.time ? esc(new Date(m.time).toLocaleDateString()) : ''}</div>
    </div>
  `).join('');
}

function renderTrips(trips) {
  const tc = document.getElementById('trips-container');
  if (!trips || trips.length === 0) {
    tc.innerHTML = '<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">No trips on file yet.</div></div>';
    return;
  }
  tc.innerHTML = trips.map(t => `
    <div class="trip-card">
      <div class="trip-dest">${esc(t.destination || t.dest || 'Trip')}</div>
      <div class="trip-dates">${esc(t.dates || '')}</div>
      <div class="trip-meta">
        ${t.passengers ? esc(t.passengers) + ' passenger' + (t.passengers != '1' ? 's' : '') : ''}
        ${t.cabin ? ' · ' + esc(t.cabin) : ''}
        ${t.flexibility ? ' · ' + esc(t.flexibility) : ''}
      </div>
    </div>
  `).join('');
}

function renderPoints(points) {
  const pc = document.getElementById('points-container');
  if (!points || points.length === 0) {
    pc.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">💰</div><div class="empty-text">No points recorded yet.</div></div>';
    return;
  }
  pc.innerHTML = points.map(p => `
    <div class="point-card">
      <div class="point-name">${esc(p.program || 'Points')}</div>
      <div class="point-balance">${esc(p.balance || '—')}</div>
    </div>
  `).join('');
}

/* ── Live updates: SSE first, adaptive polling fallback, paused when hidden ── */
let evtSource = null;
let sseFailures = 0;
let reconnectTimer = null;
let reconnectDelay = 2000;

async function refetchMe() {
  const token = sessionStorage.getItem('dat_client_token');
  if (!token) { stopAutoRefresh(); return; }
  try {
    const res = await fetch('/api/client/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.ok) {
      const updated = await res.json();
      if (currentClient) {
        Object.assign(currentClient, updated);
        renderPortal(currentClient);
      }
    }
  } catch (e) {}
}

function connectStream() {
  const token = sessionStorage.getItem('dat_client_token');
  if (!token || document.hidden) return;
  disconnectStream();
  try {
    evtSource = new EventSource('/api/client/stream?token=' + encodeURIComponent(token));
    evtSource.addEventListener('hello', function() {
      sseFailures = 0;
      reconnectDelay = 2000;
      stopPollingFallback();
    });
    evtSource.addEventListener('changed', refetchMe);
    evtSource.addEventListener('bye', function() {
      disconnectStream();
      scheduleReconnect();
    });
    evtSource.onerror = function() {
      disconnectStream();
      sseFailures++;
      if (sseFailures >= 3) startPollingFallback();
      scheduleReconnect();
    };
  } catch (e) {
    startPollingFallback();
  }
}

function disconnectStream() {
  if (evtSource) { evtSource.close(); evtSource = null; }
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(function() {
    reconnectDelay = Math.min(reconnectDelay * 2, 60000);
    connectStream();
  }, reconnectDelay);
}

function startPollingFallback() {
  if (autoRefreshInterval) return;
  autoRefreshInterval = setInterval(function() {
    if (!document.hidden) refetchMe();
  }, 60000);
}

function stopPollingFallback() {
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
  }
}

function startAutoRefresh() { connectStream(); }

function stopAutoRefresh() {
  disconnectStream();
  stopPollingFallback();
  clearTimeout(reconnectTimer);
}

document.addEventListener('visibilitychange', function() {
  if (!sessionStorage.getItem('dat_client_token')) return;
  if (document.hidden) {
    stopAutoRefresh();
  } else {
    refetchMe();
    connectStream();
  }
});

// Auto-login from session
(async function() {
  const token = sessionStorage.getItem('dat_client_token');
  if (!token) return;
  try {
    const me = await fetch('/api/client/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (me.ok) return showPortal(await me.json());
  } catch (e) {}
})();
</script>
</body>
</html>
