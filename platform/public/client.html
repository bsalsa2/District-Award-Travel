<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Client Portal — District Award Travel</title>
<meta name="theme-color" content="#f97316">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--white:#ffffff;--card:#f4f3f1;
  --text:#1c1917;--muted:#78716c;--dim:#a8a29e;
  --accent:#f97316;--accent-dim:rgba(249,115,22,.09);--accent-border:rgba(249,115,22,.2);
  --border:#e7e5e4;--border2:#d6d3d1;
  --green:#16a34a;--red:#dc2626;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── BOOT SPLASH ── */
#boot{display:none;position:fixed;inset:0;z-index:999;background:#0c0905;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#boot.show{display:flex}
.boot-mark{width:60px;height:60px;border-radius:17px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;animation:bootPulse 1.2s ease-in-out infinite;box-shadow:0 8px 32px rgba(249,115,22,.4)}
@keyframes bootPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.boot-txt{font-size:13px;color:rgba(255,255,255,.5);font-weight:500}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:#0c0905;position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% 25%,rgba(249,115,22,.16),transparent 65%),radial-gradient(ellipse 45% 40% at 15% 80%,rgba(249,115,22,.07),transparent 60%);pointer-events:none}
.login-card{position:relative;background:#fff;border:1px solid rgba(249,115,22,.25);border-radius:18px;padding:40px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.55),0 0 80px rgba(249,115,22,.1)}
.login-brand{font-size:18px;font-weight:800;margin-bottom:4px}.login-brand span{color:var(--accent)}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;border:1px solid var(--border2);border-radius:8px;padding:11px 14px;font-size:14px;font-family:var(--font);color:var(--text);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s;margin-top:4px}
.btn-login:hover{background:#ea6c0a}.btn-login:disabled{opacity:.55;cursor:not-allowed}
.login-err{color:var(--red);font-size:13px;margin-top:12px;display:none;text-align:center}
.login-foot{margin-top:20px;font-size:13px;color:var(--muted);text-align:center}
.login-foot a{color:var(--accent);font-weight:500}

/* ── PORTAL ── */
#portal{display:none;flex-direction:column;min-height:100vh}

/* Top nav */
.topnav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:56px;position:sticky;top:0;z-index:100}
.nav-brand{font-size:15px;font-weight:800;white-space:nowrap}.nav-brand span{color:var(--accent)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{border:none;background:none;padding:8px 14px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:8px;font-family:var(--font);transition:.15s;position:relative;white-space:nowrap}
.nav-tab:hover{background:var(--card);color:var(--text)}
.nav-tab.active{background:var(--accent-dim);color:var(--accent);font-weight:700}
.nav-unread{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;vertical-align:top;margin-left:4px;margin-top:-1px}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-name{font-size:13px;font-weight:600;color:var(--text);display:none}
@media(min-width:500px){.nav-name{display:block}}
.btn-signout{border:none;background:none;font-size:13px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:6px;font-family:var(--font);transition:.15s}
.btn-signout:hover{background:#fee2e2;color:var(--red)}

/* Panels */
.panels{flex:1}
.panel{display:none;max-width:820px;margin:0 auto;padding:32px 20px}
.panel.active{display:block}
@media(min-width:640px){.panel{padding:40px 32px}}

/* ── HOME ── */
.home-greeting{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.status-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--text);margin-bottom:28px}
.status-pill.active{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.25);color:var(--accent)}
.status-pill.done{background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.2);color:var(--green)}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;animation:sdBlink 1.8s ease-in-out infinite alternate}
@keyframes sdBlink{0%{opacity:1}100%{opacity:.3}}
.status-pill.done .status-dot{animation:none}

/* Plan section */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:16px}
.plan-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.plan-eyebrow-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.plan-eyebrow-txt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.plan-title{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.plan-meta{font-size:13px;color:var(--muted);margin-bottom:20px}
.plan-overview{font-size:14px;line-height:1.7;color:var(--muted);background:var(--card);border-left:3px solid var(--accent-border);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:20px}

/* ── BOARDING PASS CARD (client) ── */
.bp-card{display:grid;grid-template-columns:1fr 28px 1fr;border:1px solid rgba(249,115,22,.2);border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08),0 0 0 1px rgba(249,115,22,.05);margin-bottom:16px}
.bp-left{background:linear-gradient(135deg,#1c0f05,#2d1507);padding:24px 20px;color:#fff}
.bp-left-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(251,146,60,.7);margin-bottom:6px}
.bp-route{font-size:clamp(24px,5vw,38px);font-weight:900;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#fff,rgba(255,255,255,.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
.bp-cabin{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:16px}
.bp-pts-box{background:rgba(249,115,22,.18);border:1px solid rgba(249,115,22,.3);border-radius:9px;padding:9px 12px}
.bp-pts-num{font-size:18px;font-weight:900;color:#fb923c;letter-spacing:-1px;line-height:1}
.bp-pts-lbl{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.bp-pts-prog{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}
.bp-tear{background:#f8f7f5;border-left:2px dashed rgba(249,115,22,.2);border-right:2px dashed rgba(249,115,22,.2);position:relative}
.bp-tear::before,.bp-tear::after{content:'';position:absolute;width:18px;height:18px;background:var(--bg);border-radius:50%;border:1px solid rgba(249,115,22,.12);left:50%;transform:translateX(-50%)}
.bp-tear::before{top:-9px}.bp-tear::after{bottom:-9px}
.bp-right{background:#fff;padding:24px 18px;display:flex;flex-direction:column;justify-content:space-between}
.bp-rows{display:flex;flex-direction:column;gap:0;margin-bottom:12px}
.bp-row{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid #f0eeec}
.bp-row:last-child{border-bottom:none}
.bp-row-lbl{color:var(--muted)}
.bp-row-val{font-weight:700;color:var(--text)}
.bp-save{display:flex;justify-content:space-between;align-items:center;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);border-radius:9px;padding:11px 14px}
.bp-save-lbl{font-size:12px;font-weight:700;color:var(--green)}
.bp-save-val{font-size:18px;font-weight:900;color:var(--green);letter-spacing:-1px}
.bp-notes{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;font-style:italic}
/* mobile stacked */
@media(max-width:560px){
  .bp-card{grid-template-columns:1fr;grid-template-rows:auto 20px auto}
  .bp-tear{width:100%;height:20px;border-left:none;border-right:none;border-top:2px dashed rgba(249,115,22,.2);border-bottom:2px dashed rgba(249,115,22,.2)}
  .bp-tear::before{top:50%;left:-9px;transform:translateY(-50%)}
  .bp-tear::after{top:50%;right:-9px;left:auto;transform:translateY(-50%)}
}

/* No plan placeholder */
.no-plan{background:var(--white);border:2px dashed var(--border2);border-radius:14px;padding:36px 24px;text-align:center;margin-bottom:28px}
.no-plan-icon{font-size:40px;margin-bottom:12px}
.no-plan-title{font-size:16px;font-weight:700;margin-bottom:6px}
.no-plan-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.btn-msg{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-msg:hover{background:#ea6c0a}

/* Recent messages on home */
.msg-preview-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;margin-bottom:20px}
.msg-preview{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.15s}
.msg-preview:hover{border-color:var(--accent-border);background:#fffcfa}
.msg-preview.unread{border-left:3px solid var(--accent)}
.msg-preview-top{display:flex;justify-content:space-between;margin-bottom:4px}
.msg-preview-from{font-size:13px;font-weight:600}
.msg-preview-time{font-size:12px;color:var(--dim)}
.msg-preview-body{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-preview-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);margin-right:6px}
.view-all-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;transition:.15s}
.view-all-btn:hover{opacity:.75}

/* ── MESSAGES (chat) ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 56px - 80px);min-height:400px}
.chat-scroll{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:16px}
.chat-input-row{padding-top:16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.chat-textarea{flex:1;border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:14px;font-family:var(--font);color:var(--text);resize:none;outline:none;transition:border-color .15s;max-height:120px;line-height:1.5}
.chat-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.chat-send{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s;white-space:nowrap;flex-shrink:0}
.chat-send:hover{background:#ea6c0a}.chat-send:disabled{opacity:.5;cursor:not-allowed}
.bubble-row{display:flex;flex-direction:column;gap:3px}
.bubble-row.me{align-items:flex-end}
.bubble-with-avatar{display:flex;align-items:flex-end;gap:8px}
.bubble-row.me .bubble-with-avatar{flex-direction:row-reverse}
.bubble-avatar{width:28px;height:28px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.bubble-avatar.adv{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none}
.bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;max-width:480px;word-break:break-word}
.bubble.adv{background:#fff;border:1px solid var(--border);border-radius:14px 14px 14px 4px;color:var(--text)}
.bubble.me{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px}
.bubble-subject{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:6px}
.bubble.me .bubble-subject{color:rgba(255,255,255,.7)}
.bubble-ts{font-size:11px;color:var(--dim);padding:0 4px}
.bubble-row.me .bubble-ts{text-align:right}
.chat-day{text-align:center;margin:8px 0}
.chat-day-pill{font-size:11px;color:var(--dim);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.bubble-img{max-width:220px;max-height:180px;border-radius:8px;margin-top:6px;cursor:pointer;display:block}
/* plan card inside chat bubble */
.bubble-plan-card{background:var(--card);border:1px solid var(--accent-border);border-radius:10px;padding:12px 14px;margin-top:8px;max-width:480px}
.bubble-plan-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.bubble-plan-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.bubble-plan-opts{display:flex;flex-direction:column;gap:8px}
.bubble-plan-opt{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.bubble-plan-opt-name{font-size:13px;font-weight:600}
.bubble-plan-opt-pts{font-size:13px;font-weight:700;color:var(--accent)}
.empty-chat{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-chat-ico{font-size:40px;margin-bottom:12px}

/* Attach preview */
.chat-attach-preview{display:none;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:12px;color:var(--muted)}
.chat-attach-preview.visible{display:flex}
.attach-thumb{width:40px;height:40px;border-radius:4px;object-fit:cover;cursor:pointer}
.attach-rm{border:none;background:none;cursor:pointer;font-size:16px;color:var(--muted);padding:0 4px}
.attach-file-btn{border:1px solid var(--border2);background:var(--white);border-radius:8px;padding:9px 12px;font-size:13px;cursor:pointer;font-family:var(--font);color:var(--muted);transition:.15s;flex-shrink:0}
.attach-file-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── POINTS ── */
.points-add{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:28px}
.points-add-title{font-size:15px;font-weight:700;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
.pts-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.pts-field input,.pts-field select{width:100%;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--white);outline:none;transition:border-color .15s}
.pts-field input:focus,.pts-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.pts-est{font-size:12px;color:var(--muted);margin-top:4px;min-height:16px}
.btn-pts-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-pts-save:hover{background:#ea6c0a}
.pts-success{font-size:13px;color:var(--green);font-weight:600;margin-left:12px}
.points-list{display:flex;flex-direction:column;gap:10px}
.point-row{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.point-prog{font-size:14px;font-weight:600;color:var(--text)}
.point-bal{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.point-updated{font-size:11px;color:var(--dim);margin-top:2px}
.no-points{text-align:center;padding:40px 24px;color:var(--muted);font-size:14px}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1c1917;color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="boot" role="status" aria-live="polite">
  <div class="boot-mark">D</div>
  <div class="boot-txt">Loading your portal…</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">District <span>Award</span> Travel</div>
    <div class="login-sub">Client portal — sign in to see your plan</div>
    <div class="field"><label>Email</label><input type="email" id="login-email" autocomplete="email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-foot">Questions? <a href="mailto:braden@districtawardtravel.com">Email us</a></div>
  </div>
</div>

<!-- PORTAL -->
<div id="portal">
  <nav class="topnav">
    <div class="nav-brand">District <span>Award</span> Travel</div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-home" onclick="switchTab('home')">Home</button>
      <button class="nav-tab" id="tab-messages" onclick="switchTab('messages')">Messages<span class="nav-unread" id="unread-badge" style="display:none">0</span></button>
      <button class="nav-tab" id="tab-points" onclick="switchTab('points')">Points</button>
    </div>
    <div class="nav-right">
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="panels">
    <!-- HOME -->
    <div class="panel active" id="panel-home">
      <div class="home-greeting" id="ov-greeting">Welcome back</div>
      <div id="ov-status"></div>
      <div id="ov-plan"></div>
      <div id="ov-msgs-preview"></div>
    </div>

    <!-- MESSAGES -->
    <div class="panel" id="panel-messages">
      <div class="chat-wrap">
        <div id="chat-attach-preview" class="chat-attach-preview">
          <img class="attach-thumb" id="attach-thumb" src="" alt="" onclick="openAttachFull()">
          <span id="attach-meta"></span>
          <button class="attach-rm" onclick="removeAttachment()" title="Remove">✕</button>
        </div>
        <div id="chat-scroll" class="chat-scroll"></div>
        <div class="chat-input-row">
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
          <button class="attach-file-btn" onclick="document.getElementById('file-input').click()" title="Attach image">📎</button>
          <textarea class="chat-textarea" id="chat-input" placeholder="Message your advisor…" rows="1" onkeydown="chatKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="chat-send" id="chat-send" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>

    <!-- POINTS -->
    <div class="panel" id="panel-points">
      <div class="points-add">
        <div class="points-add-title">Add or update a points balance</div>
        <div class="form-row">
          <div class="pts-field">
            <label>Loyalty Program</label>
            <select id="pts-program-input" onchange="ptsUpdateEstimate()">
              <option value="">Select program…</option>
              <option>Chase Ultimate Rewards</option>
              <option>American Express Membership Rewards</option>
              <option>Capital One Miles</option>
              <option>Citi ThankYou Points</option>
              <option>United MileagePlus</option>
              <option>Delta SkyMiles</option>
              <option>American Airlines AAdvantage</option>
              <option>Southwest Rapid Rewards</option>
              <option>Alaska Airlines Mileage Plan</option>
              <option>JetBlue TrueBlue</option>
              <option>Marriott Bonvoy</option>
              <option>Hilton Honors</option>
              <option>World of Hyatt</option>
            </select>
          </div>
          <div class="pts-field">
            <label>Current Balance</label>
            <input type="text" id="pts-balance-input" placeholder="e.g. 75,000" inputmode="numeric" oninput="ptsFormatBalance(this);ptsUpdateEstimate()">
            <div class="pts-est" id="pts-est-value"></div>
          </div>
        </div>
        <button class="btn-pts-save" onclick="ptsSubmit()">Save balance</button>
        <span class="pts-success" id="pts-success"></span>
      </div>
      <div class="section-label">Your balances</div>
      <div class="points-list" id="points-container"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ── helpers ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtNum(n){const v=parseInt(n,10);return isNaN(v)?String(n||'—'):v.toLocaleString('en-US');}
function fmtUsd(cents){if(!cents&&cents!==0)return '—';const v=Math.round(Number(cents)/100);return '$'+v.toLocaleString('en-US');}
function moneyToCents(s){if(!s)return 0;const v=parseFloat(String(s).replace(/[^0-9.]/g,''));return isNaN(v)?0:Math.round(v*100);}
function clockTime(ts){if(!ts)return '';try{const d=new Date(ts);if(isNaN(d))return '';return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch(e){return '';}}
function dayLabel(ts){if(!ts)return '';try{const d=new Date(ts);if(isNaN(d))return '';const now=new Date();const diff=Math.floor((now-d)/86400000);if(diff===0)return 'Today';if(diff===1)return 'Yesterday';if(diff<7)return d.toLocaleDateString('en-US',{weekday:'long'});return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return '';}}
function fmtTime(ts){return dayLabel(ts)||'';}
let _toastTimer=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}

/* ── Auth token (sessionStorage so tabs don't share) ── */
function getToken(){return sessionStorage.getItem('dat_client_token')||localStorage.getItem('dat_client_token');}
function setToken(t){sessionStorage.setItem('dat_client_token',t);localStorage.setItem('dat_client_token',t);}
function clearToken(){sessionStorage.removeItem('dat_client_token');localStorage.removeItem('dat_client_token');}
function logout(){clearToken();location.reload();}

/* ── Tab switching ── */
function switchTab(tab){
  ['home','messages','points'].forEach(t=>{
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='messages'){markChatRead();scrollChatBottom();}
}
function openChat(){switchTab('messages');}

/* ── Unread badge ── */
let _unreadCount=0;
function setUnread(n){
  _unreadCount=n;
  const el=document.getElementById('unread-badge');
  if(el){el.textContent=n;el.style.display=n>0?'':'none';}
}

/* ── Login ── */
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  err.style.display='none';btn.disabled=true;btn.textContent='Signing in…';
  try{
    const res=await fetch('/api/client/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const data=await res.json();
    if(res.ok&&data.token){setToken(data.token);showPortal(data);}
    else{err.textContent=data.detail||'Invalid email or password.';err.style.display='block';}
  }catch(e){err.textContent='Could not connect — please try again.';err.style.display='block';}
  btn.disabled=false;btn.textContent='Sign in';
}

/* ── Show portal ── */
let currentData=null;
function showPortal(data){
  currentData=data;
  document.getElementById('login-screen').style.display='none';
  const p=document.getElementById('portal');
  p.style.display='flex';
  renderPortal(data);
  startAutoRefresh();
}

function renderPortal(data){
  currentData=data;
  const name=(data.name||'').split(' ')[0]||'there';
  document.getElementById('ov-greeting').textContent='Welcome back, '+name+' 👋';
  document.getElementById('nav-name').textContent=name;

  const msgs=data.messages||[];
  const unread=msgs.filter(m=>m.unread&&m.sender!=='client').length;
  setUnread(unread);

  const trips=data.pipeline_trips||[];
  const status=(trips[0]&&(trips[0].workflow_status||trips[0].status))||'new';
  renderStatusPill(status);

  const plans=extractPlans(msgs);
  renderHomePlan(plans,trips);
  renderMsgsPreview(msgs.filter(m=>m.sender!=='client').slice(-3).reverse());
  renderChatMessages(msgs);
  renderPoints(data.points||[]);
}

/* ── Status pill ── */
const STATUS_INFO={
  new:        {cls:'',    icon:'📋', text:'Intake received — your advisor will reach out soon'},
  researching:{cls:'active',icon:'🔬',text:'Research in progress — finding your best options'},
  options_sent:{cls:'active',icon:'📬',text:'Your plan is ready — see below'},
  awaiting_decision:{cls:'active',icon:'⏳',text:'Waiting for your decision'},
  booked:     {cls:'done',icon:'✅',text:'Booked! Have an amazing trip'},
  invoiced:   {cls:'',    icon:'🧾',text:'Invoice sent'},
  closed:     {cls:'done',icon:'✅',text:'Complete'},
};
function renderStatusPill(status){
  const s=STATUS_INFO[status]||{cls:'',icon:'📋',text:status||'In progress'};
  document.getElementById('ov-status').innerHTML=
    `<div class="status-pill ${s.cls}"><span class="status-dot"></span>${s.icon} ${esc(s.text)}</div>`;
}

/* ── Plans ── */
function extractPlans(msgs){
  return (msgs||[])
    .filter(m=>{const p=m.plan||m.plan_details;return p&&(p.title||p.dest||p.overview||p.options);})
    .map(m=>({...(m.plan||m.plan_details),_time:m.time||m.ts||''}));
}

function renderHomePlan(plans,trips){
  const el=document.getElementById('ov-plan');
  if(!plans||!plans.length){
    const dest=(trips&&trips[0]&&trips[0].destination)||null;
    el.innerHTML=`<div class="no-plan">
      <div class="no-plan-icon">✈️</div>
      <div class="no-plan-title">${dest?'Research underway for '+esc(dest):'No plan yet'}</div>
      <div class="no-plan-sub">Your advisor is researching the best award redemptions for you. You'll see your options right here when they're ready — usually within 24–72 hours.</div>
      <button class="btn-msg" onclick="openChat()">Message my advisor →</button>
    </div>`;
    return;
  }
  const p=plans[0];
  const opts=p.options&&Array.isArray(p.options)&&p.options.length?p.options:null;
  let html=`<div style="margin-bottom:28px">
    <div class="plan-eyebrow"><div class="plan-eyebrow-dot"></div><div class="plan-eyebrow-txt">Your advisor's plan</div></div>
    <div class="plan-title">${esc(p.title||'Your Award Options')}</div>
    ${(p.dest||p.dates)?`<div class="plan-meta">${[p.dest,p.dates].filter(Boolean).map(esc).join(' · ')}</div>`:''}
    ${p.overview?`<div class="plan-overview">${esc(p.overview)}</div>`:''}`;

  if(opts){
    opts.forEach(opt=>{
      const savings=moneyToCents(opt.value);
      html+=`<div class="bp-card">
        <div class="bp-left">
          <div class="bp-left-label">${esc(opt.type||'Award Option')}</div>
          <div class="bp-route">${esc(opt.route||opt.title||'—')}</div>
          <div class="bp-cabin">${esc(opt.cabin||'—')}</div>
          ${opt.points?`<div class="bp-pts-box">
            <div class="bp-pts-num">${esc(opt.points)}</div>
            <div class="bp-pts-lbl">points required</div>
            ${opt.program?`<div class="bp-pts-prog">${esc(opt.program)}</div>`:''}
          </div>`:''}
        </div>
        <div class="bp-tear"></div>
        <div class="bp-right">
          <div class="bp-rows">
            ${opt.program?`<div class="bp-row"><span class="bp-row-lbl">Program</span><span class="bp-row-val">${esc(opt.program)}</span></div>`:''}
            ${opt.cabin?`<div class="bp-row"><span class="bp-row-lbl">Cabin / Room</span><span class="bp-row-val">${esc(opt.cabin)}</span></div>`:''}
            ${opt.value?`<div class="bp-row"><span class="bp-row-lbl">Cash price</span><span class="bp-row-val">${esc(opt.value)}</span></div>`:''}
          </div>
          ${savings>0?`<div class="bp-save"><span class="bp-save-lbl">You save</span><span class="bp-save-val">${fmtUsd(savings)}</span></div>`:''}
          ${opt.notes?`<div class="bp-notes">${esc(opt.notes)}</div>`:''}
        </div>
      </div>`;
    });
  } else {
    /* simple fallback card */
    html+=`<div style="background:#fff;border:1px solid var(--accent-border);border-radius:14px;padding:20px 22px;margin-bottom:16px">
      ${p.points?`<div style="font-size:24px;font-weight:800;color:var(--accent);margin-bottom:4px">${esc(p.points)} pts</div>`:''}
      ${p.program?`<div style="font-size:13px;color:var(--muted);margin-bottom:12px">${esc(p.program)}</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${p.cabin?`<div><div style="font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Cabin</div><div style="font-size:14px;font-weight:700">${esc(p.cabin)}</div></div>`:''}
        ${p.value?`<div><div style="font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Est. Value</div><div style="font-size:14px;font-weight:700;color:var(--green)">${esc(p.value)}</div></div>`:''}
      </div>
    </div>`;
  }

  html+=`<button class="btn-msg" style="background:none;color:var(--accent);border:1px solid var(--accent-border);margin-top:4px" onclick="openChat()">Questions? Message your advisor →</button></div>`;
  el.innerHTML=html;
}

/* ── Messages preview on Home ── */
function renderMsgsPreview(msgs){
  const el=document.getElementById('ov-msgs-preview');
  if(!msgs||!msgs.length){el.innerHTML='';return;}
  const items=msgs.map(m=>{
    const hasPlan=!!(m.plan||m.plan_details);
    const body=m.text||m.body||'';
    return `<div class="msg-preview ${m.unread?'unread':''}" onclick="openChat()">
      <div class="msg-preview-top">
        <div class="msg-preview-from">${esc(m.from||'District Award Travel')}</div>
        <div class="msg-preview-time">${fmtTime(m.time||m.ts)}</div>
      </div>
      <div class="msg-preview-body">${hasPlan?'<span class="msg-preview-tag">📋 Plan</span>':''}${esc(body.slice(0,120))}${body.length>120?'…':''}</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="section-label" style="margin-top:32px">Recent messages</div>
    <div class="msg-preview-list">${items}</div>
    <button class="view-all-btn" onclick="openChat()">Open messages →</button>`;
}

/* ── Chat ── */
function renderChatMessages(msgs){
  const el=document.getElementById('chat-scroll');
  if(!msgs||!msgs.length){
    el.innerHTML='<div class="empty-chat"><div class="empty-chat-ico">💬</div><p>No messages yet — say hi!</p></div>';
    return;
  }
  let html='',lastDay='';
  msgs.forEach(m=>{
    const mine=m.sender==='client';
    const day=dayLabel(m.time||m.ts);
    if(day&&day!==lastDay){html+=`<div class="chat-day"><span class="chat-day-pill">${esc(day)}</span></div>`;lastDay=day;}
    const pd=m.plan||m.plan_details;
    const hasPlan=pd&&(pd.title||pd.dest||pd.overview||pd.options);
    const clientInitial=(currentData&&currentData.name)?currentData.name.trim()[0].toUpperCase():'C';
    const avatar=mine?`<div class="bubble-avatar me">${clientInitial}</div>`:`<div class="bubble-avatar adv">DAT</div>`;
    const subject=(!mine&&m.subject)?`<div class="bubble-subject">${esc(m.subject)}</div>`:'';
    const body=esc(m.text||m.body||'');
    const imgHtml=m.attachment&&m.attachment.type==='image'&&m.attachment.data
      ?`<img class="bubble-img" src="${esc(m.attachment.data)}" alt="image" onclick="window.open(this.src,'_blank')" loading="lazy">`:'';
    let planHtml='';
    if(!mine&&hasPlan){
      const opts=pd.options&&Array.isArray(pd.options)&&pd.options.length?pd.options:null;
      planHtml=`<div class="bubble-plan-card">
        <div class="bubble-plan-title">${esc(pd.title||'Your Award Plan')}</div>
        ${pd.dest||pd.dates?`<div class="bubble-plan-meta">${[pd.dest,pd.dates].filter(Boolean).map(esc).join(' · ')}</div>`:''}
        ${opts?`<div class="bubble-plan-opts">`+opts.map(o=>`<div class="bubble-plan-opt"><span class="bubble-plan-opt-name">${esc(o.title||o.route||'Option')}</span><span class="bubble-plan-opt-pts">${o.points?esc(o.points)+' pts':''}</span></div>`).join('')+'</div>':
          (pd.points?`<div style="font-size:13px;font-weight:700;color:var(--accent)">${esc(pd.points)} pts · ${pd.program?esc(pd.program):''}</div>`:'')}
        <button onclick="switchTab('home')" style="margin-top:10px;font-size:12px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font)">View full plan →</button>
      </div>`;
    }
    const checkmark=mine?`<span style="color:rgba(255,255,255,.6);font-size:10px;margin-left:4px">✓</span>`:'';
    html+=`<div class="bubble-row ${mine?'me':''}">
      <div class="bubble-with-avatar">
        ${avatar}
        <div>
          <div class="bubble ${mine?'me':'adv'}">${subject}${body}${checkmark}${imgHtml}</div>
          ${planHtml}
        </div>
      </div>
      <div class="bubble-ts">${clockTime(m.time||m.ts)}</div>
    </div>`;
  });
  el.innerHTML=html;
  scrollChatBottom();
}

function scrollChatBottom(){
  const el=document.getElementById('chat-scroll');
  if(el)requestAnimationFrame(()=>{el.scrollTop=el.scrollHeight;});
}
function autoGrow(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight,120)+'px';}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}

/* Attachment */
let pendingAttachment=null;
function handleFileSelect(input){
  const file=input.files&&input.files[0];if(!file)return;input.value='';
  if(!file.type.startsWith('image/')){alert('Please select an image file.');return;}
  if(file.size>5*1024*1024){alert('Image must be under 5 MB.');return;}
  const reader=new FileReader();
  reader.onload=e=>compressImage(e.target.result,file.name);
  reader.readAsDataURL(file);
}
function compressImage(dataUrl,filename){
  const img=new Image();
  img.onload=function(){
    const MAX=1200;let w=img.width,h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const data=c.toDataURL('image/jpeg',.7);
    const kb=Math.round((data.length*3/4)/1024);
    pendingAttachment={type:'image',data,filename};
    const prev=document.getElementById('chat-attach-preview');
    document.getElementById('attach-thumb').src=data;
    document.getElementById('attach-meta').textContent=filename+' ('+kb+' KB)';
    prev.classList.add('visible');
  };
  img.src=dataUrl;
}
function removeAttachment(){
  pendingAttachment=null;
  document.getElementById('chat-attach-preview').classList.remove('visible');
  document.getElementById('attach-thumb').src='';
  document.getElementById('attach-meta').textContent='';
}
function openAttachFull(){
  if(pendingAttachment&&pendingAttachment.data){const w=window.open();w&&(w.document.write('<img src="'+pendingAttachment.data+'" style="max-width:100%">'),w.document.close());}
}

async function sendChat(){
  const inp=document.getElementById('chat-input');
  const btn=document.getElementById('chat-send');
  const text=inp.value.trim();
  const attachment=pendingAttachment;
  if(!text&&!attachment)return;
  const token=getToken();if(!token)return logout();
  btn.disabled=true;inp.disabled=true;
  try{
    const payload={body:text};if(attachment)payload.attachment=attachment;
    const res=await fetch('/api/client/message',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(payload)});
    if(res.ok){
      inp.value='';autoGrow(inp);removeAttachment();
      if(currentData){
        currentData.messages=currentData.messages||[];
        const msg={sender:'client',from:'You',time:new Date().toISOString(),text};
        if(attachment)msg.attachment=attachment;
        currentData.messages.push(msg);
        renderChatMessages(currentData.messages);
      }
      refetchMe();
    }else if(res.status===401){logout();}
    else{const d=await res.json().catch(()=>({}));alert(d.detail||'Could not send.');}
  }catch(e){alert('Network error — please try again.');}
  btn.disabled=false;inp.disabled=false;inp.focus();
}

async function markChatRead(){
  if(!currentData)return;
  const unread=(currentData.messages||[]).some(m=>m.unread&&m.sender!=='client');
  setUnread(0);
  if(!unread)return;
  (currentData.messages||[]).forEach(m=>{if(m.sender!=='client')m.unread=false;});
  const token=getToken();if(!token)return;
  try{await fetch('/api/client/messages/read',{method:'POST',headers:{'Authorization':'Bearer '+token}});}catch(e){}
}

/* ── Points ── */
const PTS_CPP={'chase ultimate rewards':1.5,'american express membership rewards':1.5,'capital one miles':1.5,'citi thankyou points':1.3,'united mileageplus':1.2,'american airlines aadvantage':1.2,'alaska airlines mileage plan':1.2,'delta skymiles':1.1,'southwest rapid rewards':1.1,'jetblue trueblue':1.1,'marriott bonvoy':0.8,'hilton honors':0.5,'world of hyatt':1.7};
function ptsCppRate(prog){const k=(prog||'').toLowerCase().trim();return PTS_CPP[k]||1.0;}
function ptsFormatBalance(input){const raw=input.value.replace(/[^0-9]/g,'');input.value=raw?Number(raw).toLocaleString('en-US'):'';}
function ptsRawBalance(){return parseInt((document.getElementById('pts-balance-input').value||'').replace(/[^0-9]/g,''),10)||0;}
function ptsUpdateEstimate(){
  const prog=document.getElementById('pts-program-input').value;
  const bal=ptsRawBalance();
  const el=document.getElementById('pts-est-value');if(!el)return;
  if(!bal){el.textContent='';return;}
  const rate=ptsCppRate(prog);
  el.textContent='≈ $'+Math.round(bal*rate/100).toLocaleString('en-US')+' est. value';
}
async function ptsSubmit(){
  const prog=(document.getElementById('pts-program-input').value||'').trim();
  const bal=ptsRawBalance();
  const successEl=document.getElementById('pts-success');
  if(!prog||!bal){showToast('Please fill in program and balance');return;}
  const token=getToken();if(!token)return;
  try{
    const meRes=await fetch('/api/client/me',{headers:{'Authorization':'Bearer '+token}});
    if(!meRes.ok)throw new Error();
    const me=await meRes.json();
    const points=me.points||[];
    const idx=points.findIndex(p=>(p.program||p.name||'').toLowerCase()===prog.toLowerCase());
    const entry={program:prog,balance:bal,updated:new Date().toISOString().slice(0,10)};
    if(idx>=0)points[idx]=entry;else points.push(entry);
    const put=await fetch('/api/client/me',{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({data:{points}})});
    if(!put.ok)throw new Error();
    document.getElementById('pts-program-input').value='';
    document.getElementById('pts-balance-input').value='';
    document.getElementById('pts-est-value').textContent='';
    if(successEl){successEl.textContent='Saved!';setTimeout(()=>successEl.textContent='',3000);}
    await refetchMe();
  }catch(e){if(successEl)successEl.textContent='Error — try again.';}
}

function renderPoints(points){
  const el=document.getElementById('points-container');
  if(!points||!points.length){
    el.innerHTML='<div class="no-points">No balances added yet. Use the form above to add your first one.</div>';
    return;
  }
  el.innerHTML=points.map(p=>{
    const bal=p.balance||p.points||0;
    const prog=p.program||p.name||'Program';
    const upd=p.updated?'Updated '+p.updated:'';
    return `<div class="point-row">
      <div><div class="point-prog">${esc(prog)}</div><div class="point-updated">${esc(upd)}</div></div>
      <div class="point-bal">${fmtNum(bal)}</div>
    </div>`;
  }).join('');
}

/* ── SSE + polling ── */
let evtSource=null,pollTimer=null,reconnectTimer=null,reconnectDelay=2000,sseFailures=0;
async function refetchMe(){
  const token=getToken();if(!token||document.hidden)return;
  try{
    const res=await fetch('/api/client/me',{headers:{'Authorization':'Bearer '+token}});
    if(res.ok)renderPortal(await res.json());
    else if(res.status===401)logout();
  }catch(e){}
}
function connectStream(){
  const token=getToken();if(!token||document.hidden)return;disconnectStream();
  try{
    evtSource=new EventSource('/api/client/stream?token='+encodeURIComponent(token));
    evtSource.addEventListener('hello',()=>{sseFailures=0;reconnectDelay=2000;stopPoll();});
    evtSource.addEventListener('changed',refetchMe);
    evtSource.addEventListener('bye',()=>{disconnectStream();scheduleReconnect();});
    evtSource.onerror=()=>{disconnectStream();sseFailures++;if(sseFailures>=3)startPoll();scheduleReconnect();};
  }catch(e){startPoll();}
}
function disconnectStream(){if(evtSource){evtSource.close();evtSource=null;}}
function scheduleReconnect(){clearTimeout(reconnectTimer);reconnectTimer=setTimeout(()=>{reconnectDelay=Math.min(reconnectDelay*2,60000);connectStream();},reconnectDelay);}
function startPoll(){if(!pollTimer)pollTimer=setInterval(()=>{if(!document.hidden)refetchMe();},60000);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
function startAutoRefresh(){connectStream();}
function stopAutoRefresh(){disconnectStream();stopPoll();clearTimeout(reconnectTimer);}
document.addEventListener('visibilitychange',()=>{if(!getToken())return;if(document.hidden)stopAutoRefresh();else{refetchMe();connectStream();}});

/* ── Boot: revalidate saved token ── */
(async function(){
  const token=getToken();if(!token)return;
  const boot=document.getElementById('boot');boot.classList.add('show');
  try{
    const res=await fetch('/api/client/me',{headers:{'Authorization':'Bearer '+token}});
    if(res.ok)showPortal(await res.json());else clearToken();
  }catch(e){clearToken();}
  boot.classList.remove('show');
})();
</script>
