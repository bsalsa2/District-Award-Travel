<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="District Award Travel">
  <defs>
    <radialGradient id="datBg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#2b2622"/>
      <stop offset="100%" stop-color="#15120f"/>
    </radialGradient>
    <linearGradient id="datRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="50%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#e85d04"/>
    </linearGradient>
    <linearGradient id="datWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="50%" stop-color="#ff8a1e"/>
      <stop offset="100%" stop-color="#ffd27a"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <circle cx="100" cy="100" r="96" fill="url(#datBg)" stroke="url(#datRing)" stroke-width="4"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#datRing)" stroke-width="2.5" opacity="0.85"/>

  <!-- curved text -->
  <path id="datTop" d="M 100,18 a 82,82 0 1,1 -0.1,0" fill="none"/>
  <path id="datBot" d="M 28,100 a 72,72 0 0,0 144,0" fill="none"/>
  <text fill="#ffb347" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="6" font-size="15">
    <textPath href="#datTop" startOffset="50%" text-anchor="middle">DISTRICT</textPath>
  </text>
  <text fill="#ffb347" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="5" font-size="14">
    <textPath href="#datBot" startOffset="50%" text-anchor="middle">AWARD&#160;&#160;TRAVEL</textPath>
  </text>

  <!-- central waveform -->
  <g stroke="url(#datWave)" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="64" y1="100" x2="64" y2="100"/>
    <line x1="74" y1="88"  x2="74"  y2="112"/>
    <line x1="84" y1="74"  x2="84"  y2="126"/>
    <line x1="94" y1="60"  x2="94"  y2="140"/>
    <line x1="104" y1="78" x2="104" y2="122"/>
    <line x1="114" y1="66" x2="114" y2="134"/>
    <line x1="124" y1="84" x2="124" y2="116"/>
    <line x1="134" y1="92" x2="134" y2="108"/>
  </g>
</svg>
