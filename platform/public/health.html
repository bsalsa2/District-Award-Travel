<!DOCTYPE html>
<html>
<head>
    <title>Platform Health Monitor</title>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <style>
        body {
            background-color: #333;
            color: #fff;
            font-family: monospace;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #444;
            border: 1px solid #555;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .status {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .task-counts {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .last-build-time {
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Platform Health Monitor</div>
        <div id="system-health" class="status"></div>
        <div id="task-counts" class="task-counts"></div>
        <div id="last-build-time" class="last-build-time"></div>
    </div>

    <script>
        fetch('/infra/health_status.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('system-health').innerText = `System Health: ${data.system_health}`;
                document.getElementById('task-counts').innerText = `Tasks: ${data.task_counts.completed} completed, ${data.task_counts.pending} pending`;
                document.getElementById('last-build-time').innerText = `Last Build Time: ${data.last_build_time}`;
            });
    </script>
</body>
</html>
