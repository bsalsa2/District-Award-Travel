<!DOCTYPE html>
<html>
<head>
    <title>Transfer Bonuses</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .bonus {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        .bonus h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>Transfer Bonuses</h1>
    <div id="bonuses"></div>
    <script>
        fetch('/api/transfer_bonuses')
            .then(response => response.json())
            .then(bonuses => {
                const bonusesHtml = bonuses.map(bonus => {
                    const expirationDate = new Date(bonus.expiration);
                    const countdown = Math.floor((expirationDate - new Date()) / 1000);
                    return `
                        <div class="bonus">
                            <h2>${bonus.name}</h2>
                            <p>Program: ${bonus.program}</p>
                            <p>Percentage: ${bonus.percentage}</p>
                            <p>Expiration: ${bonus.expiration}</p>
                            <p>Countdown: ${countdown} seconds</p>
                        </div>
                    `;
                }).join('');
                document.getElementById('bonuses').innerHTML = bonusesHtml;
            });
    </script>
</body>
</html>
