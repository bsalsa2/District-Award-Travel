<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Award Travel Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Award Travel Dashboard</h1>
    </header>
    <main>
        <section id="recommendations">
            <h2>Recommendations</h2>
            <ul id="recommendations-list"></ul>
        </section>
        <section id="search">
            <h2>Search</h2>
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Destination or airline">
                <button id="search-button">Search</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
