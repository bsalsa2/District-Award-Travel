<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Award Travel - 3D Route Explorer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/libs/dat.gui.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>District Award Travel</h1>
            <h2>3D Award Route Explorer</h2>
            <div class="user-indicator" id="user-indicator">You (Online)</div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="panel">
                    <h3>Route Controls</h3>
                    <div class="form-group">
                        <label for="departure">Departure:</label>
                        <input type="text" id="departure" placeholder="e.g., JFK" value="JFK">
                    </div>
                    <div class="form-group">
                        <label for="destination">Destination:</label>
                        <input type="text" id="destination" placeholder="e.g., NRT" value="NRT">
                    </div>
                    <div class="form-group">
                        <label for="departure-date">Departure Date:</label>
                        <input type="date" id="departure-date" value="2026-06-15">
                    </div>
                    <div class="form-group">
                        <label for="return-date">Return Date:</label>
                        <input type="date" id="return-date" value="2026-06-25">
                    </div>
                    <button id="optimize-btn">Optimize Route</button>
                    <button id="save-itinerary-btn">Save Itinerary</button>
                    <button id="share-itinerary-btn">Share for Collaboration</button>
                </div>

                <div class="panel">
                    <h3>Award Options</h3>
                    <div id="award-options-list"></div>
                </div>

                <div class="panel">
                    <h3>AI Suggestions</h3>
                    <div id="ai-suggestions"></div>
                </div>
            </div>

            <div class="globe-container" id="globe-container"></div>
        </div>

        <div class="collaboration-panel" id="collaboration-panel">
            <h3>Collaboration</h3>
            <div id="collaborators-list"></div>
            <input type="text" id="collaborator-email" placeholder="Add collaborator by email">
            <button id="add-collaborator-btn">Add</button>
        </div>
    </div>

    <script src="js/globe.js"></script>
    <script src="js/optimizer.js"></script>
    <script src="js/collaboration.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
