<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Award Travel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Login</a></li>
                <li><a href="#">Register</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Welcome to District Award Travel</h1>
        <p>Redeem your award points for travel rewards</p>
        <form id="redemption-form">
            <label for="user-id">User ID:</label>
            <input type="text" id="user-id" name="user-id"><br><br>
            <label for="award-points">Award Points:</label>
            <input type="number" id="award-points" name="award-points"><br><br>
            <label for="redemption-date">Redemption Date:</label>
            <input type="date" id="redemption-date" name="redemption-date"><br><br>
            <button type="submit">Redeem</button>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
