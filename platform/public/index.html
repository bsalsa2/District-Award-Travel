<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Award Travel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>District Award Travel</h1>
    </header>
    <main>
        <section id="award-redemption-simulator">
            <h2>Award Redemption Simulator</h2>
            <form id="award-redemption-form">
                <label for="client-id">Client ID:</label>
                <input type="number" id="client-id" name="client-id">
                <label for="travel-dates">Travel Dates:</label>
                <input type="date" id="travel-dates" name="travel-dates">
                <label for="destination">Destination:</label>
                <input type="text" id="destination" name="destination">
                <button id="simulate-redemption">Simulate Redemption</button>
            </form>
            <div id="simulation-results"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
