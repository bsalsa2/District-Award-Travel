<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Award Flight Recommendation System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Award Flight Recommendation System</h1>
    <form id="flight-form">
        <label for="origin">Origin:</label>
        <input type="text" id="origin" name="origin"><br><br>
        <label for="destination">Destination:</label>
        <input type="text" id="destination" name="destination"><br><br>
        <label for="departure-date">Departure Date:</label>
        <input type="date" id="departure-date" name="departure-date"><br><br>
        <button id="submit-button">Get Recommended Flights</button>
    </form>
    <div id="recommended-flights"></div>

    <script src="script.js"></script>
</body>
</html>
