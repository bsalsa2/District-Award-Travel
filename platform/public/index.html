<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Award Travel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>District Award Travel</h1>
    <form id="book-award-form">
        <label for="user-id">User ID:</label>
        <input type="number" id="user-id" name="user-id"><br><br>
        <label for="award-id">Award ID:</label>
        <input type="number" id="award-id" name="award-id"><br><br>
        <label for="points">Points:</label>
        <input type="number" id="points" name="points"><br><br>
        <button type="submit">Book Award</button>
    </form>
    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
