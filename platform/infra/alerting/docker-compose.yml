version: '3.8'

services:
  alerting-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: district-alerting-service
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./logs:/var/log/alerting
      - ./config:/etc/alerting
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - PROMETHEUS_MULTIPROC_DIR=/tmp
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - district-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  alerting-monitor:
    image: prom/prometheus:latest
    container_name: district-alerting-monitor
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - district-network
    depends_on:
      - alerting-service

  alerting-dashboard:
    image: grafana/grafana:latest
    container_name: district-alerting-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - district-network
    depends_on:
      - alerting-monitor

networks:
  district-network:
    driver: bridge
    name: district-network
