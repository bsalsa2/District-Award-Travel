global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'alerting-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['alerting-service:8080']
    scrape_interval: 10s
    scrape_timeout: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Alert rules for the alerting system itself
rule_files:
  - "alert.rules.yml"
