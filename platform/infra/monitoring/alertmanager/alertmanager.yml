global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alerting@district-award-travel.com'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'team-email'
  routes:
    - match:
        severity: critical
      receiver: 'team-email'
      continue: true
    - match:
        severity: warning
      receiver: 'team-slack'
      continue: false

receivers:
- name: 'team-email'
  email_configs:
  - to: 'alerts@district-award-travel.com'
    send_resolved: true

- name: 'team-slack'
  slack_configs:
  - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    channel: '#alerting'
    send_resolved: true
    icon_url: 'https://grafana.com/static/assets/img/fav32.png'
    title: '{{ template "slack.title" . }}'
    text: '{{ template "slack.text" . }}'

templates:
- '/etc/alertmanager/templates/*.tmpl'
