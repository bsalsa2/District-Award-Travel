version: '3'
services:
  monitoring:
    build: ./monitoring
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - aiops
    environment:
      - AIOPS_URL=http://aiops:8081

  aiops:
    build: ./aiops
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgres://user:password@database:5432/database

  database:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=database
