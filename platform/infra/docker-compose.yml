version: '3.8'

services:
  # Nginx Load Balancer with GPU metrics support
  nginx-lb:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
      - "443:443"
      - "9090:9090"  # Prometheus metrics
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
      - ./logs/nginx:/var/log/nginx
    networks:
      - gpu-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jenkins Controller with GPU support
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins:/usr/share/jenkins/ref
      - ./scripts:/scripts
    environment:
      - JENKINS_OPTS=--httpPort=8080 --prefix=/jenkins
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - gpu-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/jenkins/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  # GPU Worker Pool
  gpu-worker-1:
    image: nvcr.io/nvidia/pytorch:23.10-py3
    container_name: gpu-worker-1
    volumes:
      - ./scripts:/scripts
      - ./models:/models
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JENKINS_URL=http://jenkins:8080/jenkins
    networks:
      - gpu-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '8'
          memory: 32G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nvidia-smi"]
      interval: 60s
      timeout: 10s
      retries: 3

  gpu-worker-2:
    image: nvcr.io/nvidia/pytorch:23.10-py3
    container_name: gpu-worker-2
    volumes:
      - ./scripts:/scripts
      - ./models:/models
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - JENKINS_URL=http://jenkins:8080/jenkins
    networks:
      - gpu-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '8'
          memory: 32G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nvidia-smi"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Morpheus Anomaly Detection Service
  morpheus:
    image: nvcr.io/nvidia/morpheus/morpheus:23.10
    container_name: morpheus
    ports:
      - "8081:8081"
    volumes:
      - ./morpheus/config:/config
      - ./logs/morpheus:/logs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - gpu-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules:/etc/prometheus/alert.rules
      - ./prometheus/data:/prometheus
    networks:
      - gpu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - gpu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session management
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gpu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for CI/CD metadata
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: jenkins
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jenkins}
      POSTGRES_DB: jenkins
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gpu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jenkins"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Canary Deployment Service
  canary-service:
    image: district-award/canary-service:latest
    container_name: canary-service
    ports:
      - "8082:8082"
    volumes:
      - ./canary/config:/config
      - ./logs/canary:/logs
    networks:
      - gpu-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Rollback Service
  rollback-service:
    image: district-award/rollback-service:latest
    container_name: rollback-service
    ports:
      - "8083:8083"
    volumes:
      - ./rollback/config:/config
      - ./logs/rollback:/logs
    networks:
      - gpu-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Multi-region Sync Service
  region-sync:
    image: district-award/region-sync:latest
    container_name: region-sync
    volumes:
      - ./sync/config:/config
      - ./logs/sync:/logs
    networks:
      - gpu-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  jenkins-data:
  grafana-storage:
  redis-data:
  postgres-data:

networks:
  gpu-network:
    driver: bridge
