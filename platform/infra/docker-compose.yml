version: '3'
services:
  monitoring-system:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs
    depends_on:
      - nginx
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always
