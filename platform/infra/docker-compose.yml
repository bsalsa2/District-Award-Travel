version: '3'
services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      - INSTANCE_COUNT=1
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
  predictive-analytics:
    build: .
    command: python predictive_analytics.py
    environment:
      - MODEL_FILE=model.pkl
    volumes:
      - ./platform/infra:/app
  autoscaling:
    build: .
    command: python autoscaling.py
    environment:
      - INSTANCE_COUNT=1
    volumes:
      - ./platform/infra:/app
