version: '3'
services:
  aiops-platform:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - ml-model
      - anomaly-detector
      - incident-responder
    environment:
      - ML_MODEL_URL=http://ml-model:8000
      - ANOMALY_DETECTOR_URL=http://anomaly-detector:8001
      - INCIDENT_RESPONDER_URL=http://incident-responder:8002

  ml-model:
    build: ./ml-model
    ports:
      - "8000:8000"

  anomaly-detector:
    build: ./anomaly-detector
    ports:
      - "8001:8001"

  incident-responder:
    build: ./incident-responder
    ports:
      - "8002:8002"
