# -*- coding: utf-8 -*-
# FILE: platform/infra/config/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert.rules"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'availability-service'
    static_configs:
      - targets: ['availability-service:8000']

  - job_name: 'edge-router'
    static_configs:
      - targets: ['edge-router:80']

  - job_name: 'edge-ai-service'
    static_configs:
      - targets: ['edge-ai-service:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-cache:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-db:9187']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
