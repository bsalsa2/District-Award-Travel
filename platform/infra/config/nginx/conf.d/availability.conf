# -*- coding: utf-8 -*-
# FILE: platform/infra/config/nginx/conf.d/availability.conf

upstream availability_backend {
    server availability-service:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Global rate limiting
    limit_req zone=api_limit burst=200 nodelay;

    # Edge caching for GET requests
    location /awards/search {
        proxy_cache edge_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 10s;
        proxy_cache_valid 404 1s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://availability_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /awards/realtime {
        proxy_cache edge_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://availability_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /awards/update {
        # POST requests not cached
        proxy_pass http://availability_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://availability_backend;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://availability_backend;
        proxy_set_header Host $host;
    }

    # Health check endpoint
    location = /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 404 for unknown paths
    location / {
        return 404;
    }
}
