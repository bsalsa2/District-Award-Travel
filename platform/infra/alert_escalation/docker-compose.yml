version: '3.8'

services:
  alert-escalation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alert-escalation
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - METRICS_PORT=9090
      - DEBUG=${DEBUG:-False}
    depends_on:
      - redis
    networks:
      - alert-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  escalation-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: escalation-worker
    restart: unless-stopped
    command: ["escalation-worker"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=${DEBUG:-False}
    depends_on:
      - redis
      - alert-escalation
    networks:
      - alert-network

  redis:
    image: redis:7-alpine
    container_name: alert-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alert-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: alert-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - alert-network

  grafana:
    image: grafana/grafana:latest
    container_name: alert-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - alert-network

volumes:
  redis_data:
  grafana_data:

networks:
  alert-network:
    driver: bridge
