http {
    upstream award-travel-service {
        server award-travel-service:8080;
    }

    server {
        listen 80;
        server_name example.com;

        location / {
            proxy_pass http://award-travel-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
